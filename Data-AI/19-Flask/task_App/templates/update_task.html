<h2>Update Task</h2>

<form method="POST">
    <input name="title" value="{{ task.title }}"><br><br>

    <input name="urgency" type="number" value="{{ task.urgency }}"><br><br>

    <input name="time" type="number" value="{{ task.time_required }}"><br><br>

    <button type="submit">Update</button>
</form>
