<h2>Add Task</h2>

<form method="POST">
    <input name="title" placeholder="Task title" required><br><br>

    <input name="urgency" type="number" placeholder="Urgency (1-5)" required><br><br>

    <input name="time" type="number" placeholder="Time required (hours)" required><br><br>

    <button type="submit">Add Task</button>
</form>
